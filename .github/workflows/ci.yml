name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (gdtoolkit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gdlint
        run: make lint

      - name: Check formatting
        run: make format-check

  test:
    name: Unit tests (GUT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: make test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test_results.xml
